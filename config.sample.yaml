# Denon AVR Proxy Configuration
#
# Copy this file to config.yaml and edit as needed.
#   cp config.sample.yaml config.yaml

# IP address or hostname of the physical Denon AVR.
# Default is empty (DEMO mode - no physical AVR; accepts clients but does not forward commands).
avr_host: ""

# Telnet port on the physical AVR (typically 23)
avr_port: 23

# IP address to bind the proxy server (0.0.0.0 = all interfaces)
proxy_host: "0.0.0.0"

# Port for clients to connect to (e.g., Home Assistant, UC Remote 3)
# Must be 23 - HA Denon integration does not support custom ports
proxy_port: 23

# Logging verbosity: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"

# denonavr library log level (used for initial HTTP state sync). Independent of log_level.
denonavr_log_level: "INFO"

# Command groups to log at INFO (others stay DEBUG when log_level is DEBUG).
# Groups: power, volume, input, mute, sound_mode, smart_select, other. Default: none (all DEBUG when log_level is DEBUG).
log_command_groups_info: []

# Custom input sources: map Denon function codes to display names in Home Assistant.
# Use this if you only use certain inputs and want names to match your AVR's custom names.
# Format: dict (func_code: "Display Name"). Set to null to use device/default list.
sources: null
# Example override:
# sources:
#   CD: "CD"
#   BD: "PlayStation"
#   HDMI1: "Apple TV"
#   HDMI2: "Cable Box"
#   NET: "Streaming"

# SSDP discovery (e.g. for Home Assistant auto-discovery)
enable_ssdp: true

# When SSDP is enabled: friendly name shown in discovery and Home Assistant.
# If set, this value is used. If empty or omitted, the proxy uses the physical
# AVR's friendly name + " Proxy" (once known), or "Denon AVR Proxy" as fallback.
ssdp_friendly_name: "Denon AVR Proxy"

# When SSDP is enabled: port for serving device description XML (HA fetches this)
# Use 8080 to mimic real Denon AVRs; requires root for 80
ssdp_http_port: 8080

# When SSDP is enabled: IP to advertise in LOCATION
# Leave empty to auto-detect from primary interface
ssdp_advertise_ip: ""

# Optimistically update internal state when receiving commands, revert only if
# sending to the physical AVR fails. With the virtual AVR (no avr_host), the
# proxy forces this off because commands can't fail.
optimistic_state: true

# Delay (seconds) before broadcasting optimistic state to clients. Emulates AVR
# confirmation; avoids broadcasting change then immediately reverting on send failure.
optimistic_broadcast_delay: 0.1

# Volume step for MVUP/MVDOWN optimistic update (when optimistic_state is true, or virtual AVR). 0.5 = half-step;
# some Denon/Marantz AVRs use 1.0. Must be in 0.5 increments. With a physical AVR, the real level is always set from its response (e.g. MV?).
volume_step: 0.5

# Seconds to wait after MVUP/MVDOWN before sending MV? so the AVR has time to apply the change.
volume_query_delay: 0.15

# HTTP interface: JSON API and Web UI
enable_http: true
http_port: 8081

# Web UI: client activity log (connections, disconnections, and commands per client).
# Set to false to disable and hide the Client activity section.
client_activity_log: true
# Max entries per client (oldest dropped when exceeded). Min 1.
client_activity_log_max_entries: 200
# When true, query commands (e.g. PW?, MV?, SI?) are hidden from the activity log.
client_activity_log_hide_queries: false

# Optional: friendly names for clients by IP (shown in Web UI and API). Omit or leave empty for none.
client_aliases: {}
