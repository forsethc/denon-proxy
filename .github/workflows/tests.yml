name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  code_quality:
    name: Code Quality checks (mypy, ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full clone + tags for setuptools-scm when installing the package

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy
        run: |
          mypy src

      - name: Ruff lint
        run: |
          ruff check src tests

      - name: Ruff format
        run: |
          ruff format --check src tests

  tests:
    name: Tests (pytest unit, integration, e2e tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full clone + tags for setuptools-scm when installing the package

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: |
          pytest

  docker:
    name: Docker tests (direct, docker compose)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full clone + tags so setuptools-scm can derive version in Docker build

      - name: Prepare config for Docker
        run: cp config.sample.yaml config.yaml

      - name: Build and run (direct)
        run: |
          docker build -t denon-proxy .
          docker run -d --name denon-proxy-run \
            --cap-add=NET_BIND_SERVICE \
            -p 23:23 -p 8080:8080 -p 8081:8081 -p 60006:60006 \
            -v "$(pwd)/config.yaml:/app/config.yaml:ro" \
            denon-proxy
          sleep 3
          curl -sf http://localhost:8081/api/status
          docker stop denon-proxy-run
          docker rm denon-proxy-run

      - name: Build and run (docker compose)
        run: |
          docker compose up -d --build
          sleep 3
          curl -sf http://localhost:8081/api/status
          docker compose down

  tests_passed:
    name: Tests and code quality checks passed
    runs-on: ubuntu-latest
    needs: [docker, tests, code_quality]
    if: always()
    steps:
      - name: Fail if any dependency failed
        run: |
          if [[ "${{ needs.docker.result }}" != "success" || "${{ needs.tests.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi