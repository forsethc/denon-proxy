name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  code_quality:
    name: Code Quality checks (mypy, ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full clone + tags for setuptools-scm when installing the package

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          make init

      - name: Run code quality checks
        run: |
          make code-quality

  tests:
    name: Tests (pytest unit, integration, e2e tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full clone + tags for setuptools-scm when installing the package

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          make init

      - name: Run tests
        run: |
          make pytest

  docker:
    name: Docker tests (direct, docker compose)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full clone + tags so setuptools-scm can derive version in Docker build

      - name: Build and run (direct)
        run: |
          make docker-direct

      - name: Build and run (docker compose)
        run: |
          make docker-compose

  tests_passed:
    name: Tests and code quality checks passed
    runs-on: ubuntu-latest
    needs: [docker, tests, code_quality]
    if: always()
    steps:
      - name: Fail if any dependency failed
        run: |
          if [[ "${{ needs.docker.result }}" != "success" || "${{ needs.tests.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi