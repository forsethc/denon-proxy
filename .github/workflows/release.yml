name: Release

run-name: Release v${{ github.event.inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  release:
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create tag and push

    steps:
      - name: Set up deploy key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Update pyproject.toml version
        run: |
          python - << 'PY'
          from pathlib import Path
          import re

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          version = "${{ github.event.inputs.version }}"
          new_text = re.sub(
              r'^version\s*=\s*".*"$',
              f'version = "{version}"',
              text,
              flags=re.MULTILINE,
          )
          path.write_text(new_text, encoding="utf-8")
          PY

      - name: Write VERSION file
        run: echo "v${{ github.event.inputs.version }}" > VERSION

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION pyproject.toml
          git diff --staged --quiet || git commit -m "Release v${{ github.event.inputs.version }}"
          git push

      - name: Create tag
        run: |
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: |
            ## Denon AVR Proxy v${{ github.event.inputs.version }}

            See [README](README.md) for setup and usage.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
